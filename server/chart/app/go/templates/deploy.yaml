---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}
spec:
  selector:
    app: {{ include "app.fullname" . }}
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  annotations:
    helm.sh/revision: "{{ .Release.Revision }}"
spec:
  replicas: {{ .Values.param_replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: {{ include "app.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "app.fullname" . }}
      annotations:
        helm.sh/revision: "{{ .Release.Revision }}"
    spec:
      containers:
        - name: {{ include "app.fullname" . }}
          image: "{{ .Values.param_registry }}/{{ .Values.param_registry_dir }}/{{ include "app.fullname" . }}:{{ .Values.param_release_version }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TZ
              value: Asia/Shanghai
            - name: APP_ARGS
              value: {{ .Values.param_app_args }}
          volumeMounts:
            - name: conf
              mountPath: /app/conf/
            - name: data
              mountPath: /app/data/
              subPath: data
      volumes:
        - name: conf
          configMap:
            name: {{ include "app.fullname" . }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.param_data_claim_name }}
