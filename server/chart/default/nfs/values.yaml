nfs-subdir-external-provisioner:
  replicaCount: 1
{% if param_mirror_use_proxy %}
  image:
    repository: {{ param_registry_proxy }}/sig-storage/nfs-subdir-external-provisioner
{% endif %}
  storageClass:
    name: nfs
    defaultClass: true
  nfs:
    server: {{ param_nfs_kube_server }}
    path: {{ param_nfs_kube_data }}-{{ param_cluster_name }}