---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rabbitmq
  namespace: db
spec:
  hostnames:
    - rabbitmq-{{ .Values.param_cluster_name }}.czy21.com
  parentRefs:
    - name: nginx
      namespace: ops
  rules:
    - backendRefs:
      - name: rabbitmq
        port: 15672
      matches:
      - path:
          type: PathPrefix
          value: /
---