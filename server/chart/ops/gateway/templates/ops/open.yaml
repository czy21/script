
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rancher
  namespace: cattle-system
spec:
  hostnames:
    - rancher-{{ .Values.param_cluster_name }}.czy21.com
  parentRefs:
    - name: nginx
      namespace: ops
  rules:
    - backendRefs:
      - name: rancher
        port: 80
      matches:
      - path:
          type: PathPrefix
          value: /
---
