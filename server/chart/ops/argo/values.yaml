argo-workflows:
  fullnameOverride: argo-workflows
  crds:
    upgradeJob:
      image:
        repository: '{{ param_registry_proxy }}/kubectl'
  controller:
    image:
      registry: '{{ param_registry_proxy }}'
    workflowNamespaces: []
  server:
    image:
      registry: '{{ param_registry_proxy }}'
  executor:
    image:
      registry: '{{ param_registry_proxy }}'
  artifactRepository:
    archiveLogs: true
    s3: 
      endpoint: "{{ param_s3_endpoint }}"
      bucket: argo
      keyFormat: "{{ '{{' }} workflow.uid {{ '}}' }}"
      accessKeySecret:
        name: argo-artifact-credentials
        key: accessKey
      secretKeySecret:
        name: argo-artifact-credentials
        key: secretKey