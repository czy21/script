nginx-gateway-fabric:
  nginxGateway:
    name: nginx-gateway
  gateways:
    - name: nginx
      namespace: ops
      spec:
        gatewayClassName: nginx
        listeners:
          - name: http
            port: 80
            protocol: HTTP
            hostname: '*.czy21.com'
            allowedRoutes:
              namespaces:
                from: All
          - name: https
            port: 443
            protocol: HTTPS
            hostname: '*.czy21.com'
            tls:
              certificateRefs:
                - name: czy21.com-secret
                  kind: Secret
                  group: ''
              mode: Terminate
            allowedRoutes:
              namespaces:
                from: All