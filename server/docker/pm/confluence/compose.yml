version: "3.9"

services:
  confluence:
    image: {{ param_registry }}/{{ param_registry_dir }}/confluence
    container_name: confluence
    privileged: true
    user: root
    volumes:
      - {{ param_docker_data }}/{{ param_role_name }}/data/:/var/atlassian/confluence/
    environment:
      TZ: Asia/Shanghai
      CATALINA_OPTS: "-Xmx2G"




