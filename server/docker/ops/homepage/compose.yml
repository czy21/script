version: "3.9"

x-traefik-label: &traefik-label
  traefik.enable: true
  traefik.http.routers.{{ param_role_name }}.service: {{ param_role_name }}
  traefik.http.services.{{ param_role_name }}.loadbalancer.server.port: 3000

services:

  homepage:
    image: "{{ param_registry_proxy }}/gethomepage/homepage:v1.12.3" # ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    labels:
      <<: *traefik-label
    privileged: true
    user: root
    volumes:
      - {{ param_docker_data }}/{{ param_role_name }}/conf/:/app/config/
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: {{ param_user_ops_uid }}
      PGID: {{ param_user_ops_gid }}
      TZ: Asia/Shanghai
    restart: always