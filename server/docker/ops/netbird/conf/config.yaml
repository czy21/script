# Combined NetBird Server Configuration (Simplified)
# Generated by getting-started.sh

server:
  listenAddress: ":80"
  exposedAddress: "{{ param_netbird_endpoint }}:443"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"

  authSecret: {{ param_netbird_server_authSecret }}
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "{{ param_netbird_endpoint }}/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "{{ param_netbird_endpoint }}/nb-auth"
      - "{{ param_netbird_endpoint }}/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  reverseProxy:
    trustedHTTPProxies:
      - "172.30.0.10/32"

  store:
    engine: "sqlite"
    encryptionKey: {{ param_netbird_server_store_encryptionKey }}
