- name: valid
  assert:
    that: param_user_ops_ssh_public_key | trim != ""
    fail_msg: param_user_ops_ssh_public_key is empty
  tags:
    - "os"

- name: mirror
  shell: sh {{ param_remote_role_path }}/mirror.sh
  when: param_mirror_use_proxy
  tags:
    - "os"
    - "os-mirror"

- name: install
  shell: |-
    timedatectl set-timezone Asia/Shanghai
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}.sh
  tags:
    - "os"

- name: sshd_config
  shell: |-
    tee /etc/ssh/sshd_config.d/99-custom.conf << EOF
    UseDNS no
    PermitRootLogin yes
    PasswordAuthentication no
    ClientAliveInterval 30
    EOF
  tags:
    - "os"
    - "os-sshd"

- name: go
  shell: |-
    sh {{ param_remote_role_path }}/sdk-go.sh
  tags:
    - "sdk-go"

- name: java
  shell: |-
    sh {{ param_remote_role_path }}/sdk-java.sh
  tags:
    - "sdk-java"

- name: dotnet
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-dotnet.sh
  tags:
    - "sdk-dotnet"

- name: dnsmasq conf
  template: src=files/dnsmasq.conf dest={{ role_path }}/dnsmasq.conf
  tags:
    - "svc-dnsmasq-conf"
    - "svc-dnsmasq"

- name: dnsmasq conf
  shell: |-
    mkdir -p /etc/dnsmasq.d && cat {{ role_path }}/dnsmasq.conf | sudo tee /etc/dnsmasq.d/dnsmasq.conf > /dev/null && sudo chmod 644 /etc/dnsmasq.d/dnsmasq.conf
  tags:
    - "svc-dnsmasq-conf"
    - "svc-dnsmasq"

- name: dnsmasq install
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-dnsmasq.sh
  tags:
    - "svc-dnsmasq"

- name: nginx
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-nginx.sh
  tags:
    - "svc-nginx"

- name: redis conf
  template: src=files/redis.conf dest={{ role_path }}/redis.conf
  tags:
    - "svc-redis-conf"
    - "svc-redis"

- name: redis conf
  shell: |-
    mkdir -p /etc/redis && cat {{ role_path }}/redis.conf | sudo tee /etc/redis/redis.conf > /dev/null && sudo chmod 640 /etc/redis/redis.conf
  tags:
    - "svc-redis-conf"

- name: redis install
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-redis.sh
  tags:
    - "svc-redis"

- name: mysql conf
  template: src=files/mysqld.cnf dest={{ role_path }}/mysqld.cnf
  tags:
    - "svc-mysql-conf"
    - "svc-mysql"

- name: mysql conf
  shell: |-
    mkdir -p /etc/mysql/mysql.conf.d && cat {{ role_path }}/mysqld.cnf | sudo tee /etc/mysql/mysql.conf.d/mysqld.cnf > /dev/null && sudo chmod 644 /etc/mysql/mysql.conf.d/mysqld.cnf
  tags:
    - "svc-mysql-conf"
    - "svc-mysql"

- name: mysql install
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-mysql.sh
  tags:
    - "svc-mysql"

- name: mongo
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-mongo.sh
  tags:
    - "svc-mongo"

- name: cockpit
  shell: |-
    sh {{ param_remote_role_path }}/{{ param_ansible_os_family }}-cockpit.sh
  tags:
    - "svc-cockpit"