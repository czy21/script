- name: mkdir
  file: path={{ param_remote_role_path }} state=directory mode=0777

- template: src={{ item }} dest={{ param_remote_role_path }}
  with_fileglob:
    - "roles/{{ param_role_name }}/templates/*"

- copy: src={{ inventory_dir }}/.temp/private-key dest={{ param_remote_path }}/.temp/ mode=600
  when: 'inventory_hostname not in ["127.0.0.1","localhost"]'